<nav class="main-nav">
  <div class="nav-links">
    <a routerLink="/home" routerLinkActive="active">Home</a>
    <a routerLink="/timer-list" routerLinkActive="active">Timer List</a>
    <a routerLink="/label-list" routerLinkActive="active">Labels List</a>
    <a routerLink="/history" routerLinkActive="active">History</a>
    <a routerLink="/login" routerLinkActive="active">Login / Sign Up</a>
  </div>

  <div class="right-section">
    <button class="theme-toggle" (click)="themeService.toggleTheme()">
      {{ themeService.isDarkMode() ? 'Light' : 'Dark' }}
    </button>

    <div class="status-badge"
         [style.color]="entryService.isOnline() ? '#2b8a3e' : '#c92a2a'"
         [attr.title]="entryService.isOnline() ? 'App is Online' : 'App is Offline'"
         [attr.aria-label]="entryService.isOnline() ? 'Network status: Online' : 'Network status: Offline'">
      ●
      @if (entryService.isSyncing()) {
        <span class="sync-text">(Syncing...)</span>
      }
    </div>
  </div>
</nav>
