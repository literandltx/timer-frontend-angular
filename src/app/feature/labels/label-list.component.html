<div class="label-list-container">
  <div class="top-section">
    <div class="header-row">
      <h2 class="page-title">Label Options</h2>
      <button class="btn primary-btn" (click)="startAdd()">+ Add Label</button>
    </div>

    @if (editingLabel) {
      <div class="edit-section">
        <div class="input-group">
          <span class="edit-label">{{ editingLabel.id ? 'Edit Label:' : 'New Label:' }}</span>

          <input class="modern-input" type="text" [(ngModel)]="editingLabel.name"
                 placeholder="Label Name" autofocus/>

          <input class="modern-color-input" type="color" [(ngModel)]="editingLabel.color"
                 title="Choose label color"/>

          <div class="edit-actions">
            <button class="btn primary-btn" (click)="save()">Save</button>
            <button class="btn ghost-btn" (click)="cancel()">Cancel</button>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="options-list">
    @for (label of labelService.labels(); track label.id) {
      <div class="list-item">

        <div class="item-info">
          <span class="label-pill" [style.background-color]="label.color">
            {{ label.name }}
          </span>
          @if (label.id < 0 && labelService.isOnline()) {
            <span class="badge pending-badge">Pending</span>
          }
        </div>

        <div class="item-actions">
          <div class="action-group">
            <button class="btn text-btn edit-btn" (click)="startEdit(label)">Edit</button>
            <button class="btn text-btn delete-btn" (click)="deleteLabel(label.id)">
              Delete
            </button>
          </div>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <p class="empty-text">No labels found. Add one above!</p>
      </div>
    }
  </div>
</div>
