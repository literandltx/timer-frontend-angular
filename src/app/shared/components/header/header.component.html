        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="nav-icon" width="16" height="16">

      ●

        <span class="sync-text">(Syncing...)</span>
