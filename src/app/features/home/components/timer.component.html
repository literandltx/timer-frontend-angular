<div
  class="timer-wrapper"
  role="button"
  tabindex="0"
  (click)="onUserClick()"
  (keyup.enter)="handleClick()"
  (keyup.space)="handleClick()"
>
  <h1 class="timer-display">
    {{ timerService.formattedTime() }}
  </h1>

  <p class="timer-subtitle">
    {{ timerService.isRunning() ? 'Click to Pause' : 'Click to Start' }} • Double-click to Reset
  </p>
</div>
