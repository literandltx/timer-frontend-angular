<div class="label-list-container">
  <div class="top-section">
    <div class="header-row">
      <h2 class="page-title">Label Options</h2>
      <ns-app-button variant="primary-btn" (click)="startAdd()">+ Add Label</ns-app-button>
    </div>

    @if (editingLabel) {
      <div class="edit-section">
        <div class="input-group">
          <span class="edit-label">{{ editingLabel.uuid ? 'Edit Label:' : 'New Label:' }}</span>

          <input class="modern-input" type="text" [(ngModel)]="editingLabel.name"
                 placeholder="Label Name"/>

          <input class="modern-color-input" type="color" [(ngModel)]="editingLabel.color"
                 title="Choose label color"/>

          <div class="edit-actions">
            <ns-app-button variant="primary-btn" (click)="save()">Save</ns-app-button>
            <ns-app-button variant="ghost-btn" (click)="cancel()">Cancel</ns-app-button>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="options-list">
    @for (label of labelService.labels(); track label.uuid) {
      <ns-app-list-item>

        <ng-container info>
          <span class="label-pill" [style.background-color]="label.color">
            {{ label.name }}
          </span>
        </ng-container>

        <ng-container actions>
          <div class="action-group">
            <ns-app-button variant="text-btn edit-btn" (click)="startEdit(label)">Edit</ns-app-button>
            <ns-app-button variant="text-btn delete-btn" (click)="deleteLabel($event, label.uuid)">Delete</ns-app-button>
          </div>
        </ng-container>

      </ns-app-list-item>
    } @empty {
      <div class="empty-state">
        <p class="empty-text">No labels found. Add one above!</p>
      </div>
    }
  </div>
</div>
